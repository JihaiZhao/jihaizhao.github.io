# Project summaries (keyed by post 'link' field)
project_summaries:
  Ergodic: "Leveraged ergodic imitation to learn from both positive and negative demonstrations. Built a haptic-guided teleoperation rig where one 7-DoF Franka in impedance mode is mirrored by a second Franka, then trained robust task models with the ergodic metric — a measure of information content in motion."
  Impedance_Control: "Implemented impedance control on a 7-DoF Franka Emika collaborative arm. Compliant interaction enables safe contact with humans and objects, and serves as the substrate for downstream haptic teleoperation and learning-from-demonstration work."
  packing: "Solved the 3D bin-packing optimization problem on a Franka Emika Panda. Computer vision detects object dimension and pose; MoveIt2 plans collision-free trajectories that pack items efficiently into a container while minimizing wasted space."
  EKF_SLAM: "Built an Extended Kalman Filter SLAM stack from scratch in C++ as a set of ROS packages — turtlelib (SE(2) math), odometry, sensor models, and EKF estimation — validated in simulation on a TurtleBot navigating a landmark-rich environment."
  Botrista: "Used a Franka Emika Panda to brew pour-over coffee end-to-end. Computer vision with AprilTags localizes each tool; a custom MoveIt wrapper drives a multi-step recipe (grind → kettle → pour → discard). Built with a team of five over three weeks."
  KUKA: "Trajectory planning, odometry, and feedforward + feedback control for a KUKA youBot — a mecanum-wheel mobile base with a 5R arm. The robot picks up a block at a known pose, transports it across the workspace, and places it at a target location."
  Jack_In_Box: "Simulated a jack bouncing inside a moving box from first principles. Derived configuration frames and Lagrangian dynamics, then integrated the equations of motion over a 10 s horizon at a 0.01 s timestep, capturing collision and contact behavior."
  Robot_Pen_Stealer: "Tracked a purple pen in 3D with an Intel RealSense depth camera and commanded an Interbotix arm via the xs toolbox to grasp it in real time. Inverse kinematics maps the live target pose to joint commands for closed-loop pursuit."
  RRT: "Implemented Rapidly-Exploring Random Trees for path planning from scratch — tree growth, collision checking, and goal biasing — and demonstrated the algorithm on multi-obstacle 2D maps with both basic and goal-biased variants."


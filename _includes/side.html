<aside class="side" id="side">
  <div class="side-inner">
    <header class="side-hero">
      <div class="side-hero-top">
        <div class="side-hero-titles">
          <a href="#top" class="side-name-link" aria-label="Back to top">
            <h1 class="side-name">{{ site.hero.name }}</h1>
          </a>
          <p class="side-role">{{ site.hero.role }}</p>
        </div>
        {% if site.profile_image %}
        <a href="#top" class="side-avatar-link" aria-label="Back to top" tabindex="-1">
          <img src="/{{ site.profile_image }}" alt="{{ site.hero.name }}" class="side-avatar">
        </a>
        {% endif %}
      </div>
      <p class="side-blurb">{{ site.hero.blurb }}</p>
    </header>

    <nav class="side-nav" aria-label="In-page navigation">
      <ul>
        <li><a href="#about" class="nav-link" data-target="about"><span class="nav-marker"></span>About</a></li>
        <li><a href="#experience" class="nav-link" data-target="experience"><span class="nav-marker"></span>Experience</a></li>
        <li><a href="#projects" class="nav-link" data-target="projects"><span class="nav-marker"></span>Projects</a></li>
        <li><a href="/{{ site.resume_url }}?v={{ site.time | date: '%s' }}" target="_blank" rel="noopener" class="nav-link nav-link-ext"><span class="nav-marker"></span>Resume <i class="fa-solid fa-arrow-up-right-from-square"></i></a></li>
      </ul>
    </nav>

    <ul class="side-social" aria-label="Social links">
      {% for s in site.social %}
      <li>
        <a href="{{ s.url }}" target="_blank" rel="noopener" aria-label="{{ s.label }}">
          <i class="{{ s.icon }}"></i>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
</aside>
